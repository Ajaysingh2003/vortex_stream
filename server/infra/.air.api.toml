root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Just the shell command to build your binary.
  # We point it to your specific entry path: ./cmd/server
  cmd = "go build -o ./tmp/api ./cmd/server"
  
  # The binary file generated by the 'cmd' above.
  bin = "./tmp/api"
  
  # Customize the binary execution (e.g., adding flags)
  full_bin = "./tmp/api"
  
  # Watch these extensions
  include_ext = ["go", "tpl", "tmpl", "html", "toml"]
  
  # Ignore these directories
  exclude_dir = ["assets", "tmp", "vendor", "node_modules"]
  
  # Watch these specific files
  include_file = []
  
  # Exclude these files
  exclude_file = []
  
  # Delay after a change is detected before re-building
  delay = 1000 # ms
  
  # Stop running the old binary if a build error occurs
  stop_on_error = true
  
  # Log file location in the tmp_dir
  log = "build-errors.log"

[log]
  time = false

[color]
  # Colors for different log parts
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Clean up the temporary binary on exit
  clean_on_exit = true